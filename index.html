<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Particle Flow Simulation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- New Navbar HTML -->
    <nav class="navbar">
        <a href="#" class="logo">Portfolio</a>

        <!-- menu toggle for small screens (3-bar hamburger) -->
        <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="main-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <ul id="main-menu">
            <!-- mobile-only close button inside the sliding panel -->
            <button class="menu-close" aria-label="Close menu">&times;</button>

            <li><a href="#">Projects</a></li>
            <li><a href="#">About Me</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div id="home-title" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:2; pointer-events:none;">
        <h1 style="margin:0; color:#fff; font-size:2.5rem; font-weight:700; text-align:center;">Aman Kumar</h1>
    </div>

    <canvas id="simulationCanvas"></canvas>

    <!-- Menu toggle script (placed before your simulation script) -->
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const toggle = document.querySelector('.menu-toggle');
        const menu = document.querySelector('.navbar ul');
        const closeBtn = document.querySelector('.menu-close');
        const links = document.querySelectorAll('.navbar ul li a');

        function openMenu() {
            const isOpen = menu.classList.toggle('open');
            toggle.classList.toggle('open', isOpen);
            toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        }

        function closeMenu() {
            menu.classList.remove('open');
            toggle.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
        }

        toggle.addEventListener('click', openMenu);
        closeBtn.addEventListener('click', closeMenu);

        // close when a link is tapped (mobile UX)
        links.forEach(a => a.addEventListener('click', () => {
            // only close if panel is open (mobile)
            if (menu.classList.contains('open')) closeMenu();
        }));
    });
    </script>

    <script src="script.js"></script>
</body>
</html>
